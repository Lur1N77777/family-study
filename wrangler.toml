name = "family-study-api"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "family-study-db"
database_id = "8862031e-9d24-4397-afbf-f95c096008e7"

# R2 照片存储
[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "family-study-photos"

# 环境变量
[vars]
JWT_SECRET = "change-me-to-a-secure-random-string"
CORS_ORIGIN = "*"

[triggers]
crons = ["5 16 * * *"]

# Pages 配置（前端）
[env.dev]
name = "family-study-api-dev"

[env.dev.vars]
JWT_SECRET = "family-study-dev-only-secret-20260310"
CORS_ORIGIN = "*"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "family-study-db-dev"
database_id = "9640bf82-0779-4670-934a-2593761eac3b"

[[env.dev.r2_buckets]]
binding = "PHOTOS"
bucket_name = "family-study-photos-dev"

[site]
bucket = "./dist"
